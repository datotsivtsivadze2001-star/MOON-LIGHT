<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        header { background-color: #1a1a1c; color: #d4af37; padding: 60px 20px; border-bottom: 2px solid #d4af37; }
        .content { padding: 40px; background: #1a1a1c; max-width: 600px; margin: 20px auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(212,175,55,0.2); }
        h1 { margin: 0; font-size: 2.5em; letter-spacing: 3px; text-transform: uppercase; }
        .details { margin: 30px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 20px 0; font-size: 1.1em; }
        .btn { background-color: #d4af37; color: #000; padding: 15px 30px; text-decoration: none; border-radius: 25px; font-weight: bold; display: inline-block; transition: 0.3s; }
        .btn:hover { background-color: #fff; transform: scale(1.05); }
        footer { margin-top: 50px; font-size: 0.8em; color: #777; }
    </style>
</head>
<body>
    <header>
        <h1>MOONLIGHT EVENTS</h1>
        <p>Your Vision, Our Creation</p>
    </header>
    <div class="content">
        <h2>საქორწილო მოწვევა</h2>
        <p>მოხარულები ვართ გიხმოთ ჩვენი ცხოვრების უმნიშვნელოვანეს დღეს!</p>
        <div class="details">
            <p>📅 <strong>თარიღი:</strong> 25 ივნისი, 2026</p>
            <p>📍 <strong>ლოკაცია:</strong> მთაწმინდის პანორამა</p>
            <p>⏰ <strong>დრო:</strong> 19:00</p>
        </div>
        <a href="https://forms.google.com" target="_blank" class="btn">დასწრების დადასტურება</a>
    </div>
    <footer>
        &copy; 2026 MOONLIGHT - Event Management Company
    </footer>
</body>
</html>
