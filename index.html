<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script>
        const CONFIG = {
            names: "ნინო & თორნიკე",
            date: "2026-04-25T14:00:00", // ფორმატი: წელი-თვე-დღეTსაათი:წუთი:წამი
            location: "რესტორანი კარაველა",
            musicFile: "wedding-song.mp3",
            // აქ ჩასვი შენი Google Script-ის ახალი ლინკი
            googleScriptURL: "შენი_ახალი_ლინკი_აქ" 
        };
    </script>

    <title>MOONLIGHT | მოწვევა</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; padding: 0; background-color: #f9f7f2; font-family: 'Montserrat', sans-serif; color: #333; text-align: center; }
        .container { padding: 50px 20px; max-width: 600px; margin: auto; }
        h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 10px; color: #222; }
        .date { font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 30px; }
        
        /* ტაიმერის სტილი */
        #timer { display: flex; justify-content: center; gap: 15px; margin: 30px 0; font-family: 'Playfair Display', serif; }
        .time-box { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); min-width: 70px; }
        .time-box span { display: block; font-size: 1.5rem; font-weight: bold; }
        .time-box label { font-size: 0.7rem; text-transform: uppercase; color: #888; }

        /* ფორმის სტილი */
        .rsvp-form { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-top: 40px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
        button { background: #d4af37; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #b8962d; }

        /* მუსიკის ღილაკი */
        .music-btn { position: fixed; bottom: 20px; right: 20px; background: white; border: 1px solid #d4af37; padding: 10px; border-radius: 50px; cursor: pointer; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <button class="music-btn" onclick="toggleMusic()" id="musicControl">ჩართე მუსიკა 🎵</button>
    <audio id="bgMusic" loop>
        <source id="musicSource" type="audio/mpeg">
    </audio>

    <div class="container">
        <p style="letter-spacing: 3px; font-size: 0.8rem; color: #888;">გეპატიჟებით ქორწილში</p>
        <h1 id="weddingNames"></h1>
        <p class="date" id="weddingLocation"></p>

        <div id="timer">
            <div class="time-box"><span id="days">00</span><label>დღე</label></div>
            <div class="time-box"><span id="hours">00</span><label>სთ</label></div>
            <div class="time-box"><span id="minutes">00</span><label>წთ</label></div>
            <div class="time-box"><span id="seconds">00</span><label>წმ</label></div>
        </div>

        <div class="rsvp-form">
            <h3>დაგვიდასტურეთ მობრძანება</h3>
            <form id="attendanceForm">
                <input type="text" name="Name" placeholder="თქვენი სახელი და გვარი" required>
                <select name="Status" required>
                    <option value="">მოხვალთ?</option>
                    <option value="დასტური">დიახ, მოვალ</option>
                    <option value="უარი">სამწუხაროდ ვერ მოვალ</option>
                </select>
                <input type="number" name="Guests" placeholder="სტუმრების რაოდენობა" min="1" max="10">
                <button type="submit" id="submitBtn">გაგზავნა</button>
            </form>
            <p id="msg" style="display:none; color: green; margin-top: 15px;">მადლობა, პასუხი მიღებულია! ✨</p>
        </div>
    </div>

    <script>
        // მონაცემების შევსება CONFIG-იდან
        document.getElementById('weddingNames').innerText = CONFIG.names;
        document.getElementById('weddingLocation').innerText = CONFIG.location;
        document.getElementById('musicSource').src = CONFIG.musicFile;

        // ტაიმერის ლოგიკა
        function updateTimer() {
            const target = new Date(CONFIG.date).getTime();
            const now = new Date().getTime();
            const diff = target - now;

            if (diff > 0) {
                document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('minutes').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById('seconds').innerText = Math.floor((diff % (1000 * 60)) / 1000);
            }
        }
        setInterval(updateTimer, 1000);

        // მუსიკის მართვა
        const music = document.getElementById('bgMusic');
        function toggleMusic() {
            if (music.paused) {
                music.play();
                document.getElementById('musicControl').innerText = "გამორთე მუსიკა 🔇";
            } else {
                music.pause();
                document.getElementById('musicControl').innerText = "ჩართე მუსიკა 🎵";
            }
        }

        // ფორმის გაგზავნა Google Sheets-ში
        const form = document.getElementById('attendanceForm');
        form.addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').innerText = "იგზავნება...";

            fetch(CONFIG.googleScriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    document.getElementById('attendanceForm').style.display = 'none';
                    document.getElementById('msg').style.display = 'block';
                })
                .catch(error => alert('შეცდომა! სცადეთ თავიდან.'));
        });
    </script>
</body>
</html>
