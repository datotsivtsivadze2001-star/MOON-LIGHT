<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOONLIGHT | Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #f9f7f2; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px 0; }
        .invitation-card { background: white; width: 90%; max-width: 500px; padding: 60px 40px; text-align: center; border: 1px solid #e0d5c1; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative; }
        .invitation-card::before { content: ''; position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px; border: 1px solid #d4af37; pointer-events: none; }
        .logo-text { font-size: 0.8em; letter-spacing: 4px; color: #bc9311; margin-bottom: 30px; text-transform: uppercase; }
        h1 { font-family: 'Playfair Display', serif; font-size: 3.2em; color: #222; margin: 15px 0; font-weight: 400; }
        .and { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.5em; color: #d4af37; margin: 5px 0; }
        
        #timer { display: flex; justify-content: center; gap: 15px; margin: 30px 0; font-family: 'Montserrat', sans-serif; }
        .timer-item { background: #fdfbf7; border: 1px solid #eee; padding: 10px; min-width: 60px; border-radius: 5px; }
        .timer-num { display: block; font-size: 1.5em; color: #d4af37; font-weight: bold; }
        .timer-label { font-size: 0.6em; text-transform: uppercase; color: #888; letter-spacing: 1px; }

        .details { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; margin-bottom: 30px; }
        .date { font-size: 1.1em; letter-spacing: 2px; color: #444; text-transform: uppercase; }
        .location { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1em; color: #777; margin: 10px 0; }

        #rsvp-form-container { margin-top: 30px; border-top: 1px solid #eee; padding-top: 30px; }
        #submit-to-google-sheet { display: flex; flex-direction: column; gap: 15px; }
        
        input, select {
            padding: 12px;
            border: 1px solid #e0d5c1;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9em;
            outline: none;
            background: #fdfbf7;
        }
        input:focus, select:focus { border-color: #d4af37; }
        
        .submit-button { 
            padding: 15px; 
            background-color: #222; 
            color: white; 
            border: none; 
            cursor: pointer;
            letter-spacing: 2px; 
            font-size: 0.8em; 
            transition: 0.3s; 
            text-transform: uppercase; 
        }
        .submit-button:hover { background-color: #d4af37; }
        .submit-button:disabled { background-color: #ccc; cursor: not-allowed; }

        footer { margin-top: 40px; font-size: 0.7em; color: #bbb; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="invitation-card">
        <div class="logo-text">Moonlight Events</div>
        <p style="letter-spacing: 2px; color: #888; font-size: 0.8em;">გეპატიჟებით ქორწილში</p>
        
        <h1>David</h1>
        <div class="and">&</div>
        <h1>Nanu</h1>

        <div id="timer">
            <div class="timer-item"><span class="timer-num" id="days">00</span><span class="timer-label">დღე</span></div>
            <div class="timer-item"><span class="timer-num" id="hours">00</span><span class="timer-label">საათი</span></div>
            <div class="timer-item"><span class="timer-num" id="minutes">00</span><span class="timer-label">წუთი</span></div>
            <div class="timer-item"><span class="timer-num" id="seconds">00</span><span class="timer-label">წამი</span></div>
        </div>
        
        <div class="details">
            <div class="date">სამშაბათი, 30 ივნისი 2026</div>
            <div class="location">Mtatsminda Panorama, Tbilisi</div>
        </div>

        <div id="rsvp-form-container">
            <form id="submit-to-google-sheet">
                <p style="font-size: 0.8em; letter-spacing: 1px; color: #bc9311; margin-bottom: 10px;">დაადასტურეთ დასწრება</p>
                <input type="text" name="Name" placeholder="თქვენი სახელი და გვარი" required>
                
                <select name="Status" required>
                    <option value="" disabled selected>მოხვალთ ქორწილში?</option>
                    <option value="მოვდივარ">დიახ, მოვდივარ</option>
                    <option value="ვერ ვახერხებ">სამწუხაროდ, ვერ მოვალ</option>
                </select>

                <input type="number" name="Guests" placeholder="სტუმრების რაოდენობა" min="1" max="10">
                
                <button type="submit" class="submit-button">გაგზავნა</button>
            </form>
        </div>
        
        <footer>DESIGNED BY MOONLIGHT MANAGEMENT</footer>
    </div>

    <script>
        // ტაიმერის ლოგიკა
        const weddingDate = new Date("June 30, 2026 19:00:00").getTime();
        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = days;
            document.getElementById("hours").innerHTML = hours;
            document.getElementById("minutes").innerHTML = minutes;
            document.getElementById("seconds").innerHTML = seconds;

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("timer").innerHTML = "დღეს ქორწილია!";
            }
        }, 1000);

        // მონაცემთა გაგზავნის ლოგიკა
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyBgQb7bJ-BVTX0amyGGl-63JwK3zEQgVav4Voj8JTp-MEW6Qmvg2tNgrGJkdskb9WQ/exec'
        const form = document.forms['submit-to-google-sheet']

        form.addEventListener('submit', e => {
            e.preventDefault()
            const btn = form.querySelector('.submit-button')
            btn.innerHTML = "იგზავნება..."
            btn.disabled = true

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    alert('მადლობა! თქვენი პასუხი წარმატებით შენახულია.')
                    btn.innerHTML = "შენახულია ✓"
                    form.reset()
                })
                .catch(error => {
                    alert('შეცდომა! გთხოვთ სცადოთ თავიდან.')
                    btn.disabled = false
                    btn.innerHTML = "გაგზავნა"
                })
        })
    </script>
</body>
</html>
